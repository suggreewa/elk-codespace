input {
  # Accept logs via TCP on port 5000
  tcp {
    port => 5000
    codec => json_lines
  }

  # Accept Beats input on port 5044
  beats {
    port => 5044
  }

  # Generate sample test data (remove this in production)
  generator {
    message => '{"app":"demo","level":"info","msg":"Hello from ELK on GitHub Codespaces!"}'
    codec => json
    count => 10
  }
}

filter {
  # Add a timestamp if not present
  if ![timestamp] {
    mutate {
      add_field => { "timestamp" => "%{@timestamp}" }
    }
  }

  # Parse JSON messages if they come as plain text
  if [message] =~ /^\{/ {
    json {
      source => "message"
      target => "parsed"
      skip_on_invalid_json => true
    }
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "logs-%{+YYYY.MM.dd}"
  }

  # Also print to stdout for debugging
  stdout {
    codec => rubydebug
  }
}
